<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Cobrinha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>JOGO DA COBRINHA</h1>

    <div class="game-container">
        <canvas id="gameCanvas" width="640" height="640"></canvas>
        
        <div id="gameOverScreen">
            <h2>GAME OVER</h2>
            <p>Pontuação: <span id="finalScore">0</span></p>
            <p>Recorde: <span id="modalHighScore">0</span></p>
            <button id="restartModal">JOGAR NOVAMENTE</button>
        </div>
    </div>

    <div class="hud">
        <div>Pontos: <span id="score">0</span></div>
        <div>Recorde: <span id="highScore">0</span></div>
    </div>

    <button id="restartBtn">REINICIAR JOGO</button>

    <p class="controls">
        Use as setas do teclado ou WASD<br>
        P = Pausar • A cobra acelera a cada 5 pontos
    </p>

    <script src="script.js"></script>
</body>
</html>
